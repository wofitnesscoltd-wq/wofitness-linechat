<!doctype html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#7c5cff" />
<title>Mia & Tia 的 3C 時間銀行</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E⭐%3C/text%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #f4f5fb; --card: #ffffff; --ink: #1f2238; --muted: #6b7088; --line: #e7e8f2;
    --mia: #c45fd6; --mia-soft: #f4e3ff; --tia: #2f93ec; --tia-soft: #dcedff;
    --good: #18a957; --bad: #e23b54; --brand: #7c5cff; --warn: #ff8f1f;
    --radius: 16px; --shadow: 0 6px 22px rgba(40, 40, 90, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
      "Microsoft JhengHei", "Noto Sans TC", Roboto, sans-serif;
    color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 16px 16px 48px; }

  header.top {
    background: linear-gradient(135deg, #7c5cff 0%, #ff5fa2 100%); color: #fff;
    border-radius: var(--radius); padding: 20px 22px; box-shadow: var(--shadow);
  }
  header.top h1 { font-size: 1.45rem; letter-spacing: .5px; }
  header.top h1 .emo { font-style: normal; }
  header.top .rules { margin-top: 8px; font-size: .9rem; opacity: .95; background: rgba(255,255,255,.16); padding: 8px 12px; border-radius: 10px; }
  header.top .rules b { font-weight: 700; }

  /* Tabs */
  .tabbar { display: flex; gap: 8px; margin: 16px 0 0; }
  .tab { flex: 1; padding: 12px; border: none; border-radius: 12px 12px 0 0; background: #ececf6; color: var(--muted); font-weight: 800; cursor: pointer; font-size: .98rem; }
  .tab.on { background: var(--card); color: var(--brand); box-shadow: var(--shadow); }

  /* Month bar */
  .monthbar { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 18px 0 14px; }
  .monthbar .mlabel { font-weight: 700; font-size: 1.1rem; min-width: 150px; text-align: center; }
  .monthbar button { border: 1px solid var(--line); background: var(--card); color: var(--ink); width: 40px; height: 40px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; box-shadow: var(--shadow); }
  .monthbar button:active { transform: translateY(1px); }
  .monthbar .today { width: auto; padding: 0 14px; height: 40px; font-size: .9rem; font-weight: 600; color: var(--brand); }

  /* Balance cards */
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); border-top: 5px solid #ccc; position: relative; overflow: hidden; }
  .card.mia { border-top-color: var(--mia); }
  .card.tia { border-top-color: var(--tia); }
  .card .who { font-weight: 800; font-size: 1.15rem; display: flex; align-items: center; gap: 6px; }
  .card.mia .who { color: var(--mia); }
  .card.tia .who { color: var(--tia); }
  .card .bignum { font-size: 2rem; font-weight: 800; margin-top: 6px; line-height: 1.2; }
  .card .bignum.neg { color: var(--bad); }
  .card .unit { font-size: .85rem; color: var(--muted); font-weight: 600; }
  .card .sub { margin-top: 8px; font-size: .82rem; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .card .sub b { color: var(--ink); font-weight: 700; }
  .card-top { display: flex; align-items: center; gap: 10px; }
  .card .mascot { flex: 0 0 auto; line-height: 0; }
  .card .mascot svg { display: block; width: 78px; height: 78px; }
  .card .card-info { min-width: 0; }
  @media (max-width: 380px) { .card .mascot svg { width: 62px; height: 62px; } }

  section.block { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-top: 16px; }
  section.block > h2 { font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
  section.block.pending { border: 2px solid var(--warn); }
  section.block.pending > h2 { color: var(--warn); }

  /* Forms */
  .grid { display: grid; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: .8rem; color: var(--muted); font-weight: 600; }
  input, select { font: inherit; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink); width: 100%; }
  input:focus, select:focus { outline: 2px solid var(--brand); outline-offset: 0; border-color: var(--brand); }
  .row3 { grid-template-columns: 1fr 1fr 1fr; }
  .row2 { grid-template-columns: 1fr 1fr; }
  @media (max-width: 520px) { .row3 { grid-template-columns: 1fr 1fr; } }

  .timepick { display: flex; align-items: center; gap: 6px; }
  .timepick select { width: auto; flex: 1; min-width: 0; text-align: center; font-variant-numeric: tabular-nums; }
  .timepick .sep { color: var(--muted); font-weight: 800; }

  .btn { font: inherit; font-weight: 700; cursor: pointer; border: none; border-radius: 10px; padding: 11px 16px; background: var(--brand); color: #fff; }
  .btn:active { transform: translateY(1px); }
  .btn.sec { background: #eceaff; color: var(--brand); }
  .btn.warn { background: var(--warn); color: #fff; }
  .btn.ghost { background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .btn.danger { background: #ffe6ea; color: var(--bad); }
  .btn.sm { padding: 8px 12px; font-size: .85rem; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .preview { font-size: .9rem; color: var(--muted); min-height: 1.4em; }
  .preview b { color: var(--brand); }

  /* Pending rows */
  .prow { border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin-top: 10px; background: #fffaf2; }
  .prow .pinfo { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .prow .pinfo b { font-variant-numeric: tabular-nums; }
  .prow .pcomplete { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .prow .pcomplete .lbl { font-size: .85rem; color: var(--muted); font-weight: 600; }
  .prow .pcomplete select { width: auto; min-width: 64px; text-align: center; font-variant-numeric: tabular-nums; }

  /* Records */
  .day { border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; margin-bottom: 10px; }
  .day-date { font-weight: 700; font-size: .92rem; color: var(--muted); margin-bottom: 8px; }
  .rec { border-radius: 10px; padding: 9px 10px; margin-top: 6px; }
  .rec.mia { background: var(--mia-soft); }
  .rec.tia { background: var(--tia-soft); }
  .rec-head { display: flex; justify-content: space-between; align-items: center; }
  .rec-head .who { font-weight: 800; }
  .rec.mia .who { color: var(--mia); }
  .rec.tia .who { color: var(--tia); }
  .rec-head .earn { font-weight: 800; }
  .rec.mia .earn { color: var(--mia); }
  .rec.tia .earn { color: var(--tia); }
  .rec-body { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .rec-body .dur { font-size: .85rem; color: var(--muted); font-weight: 600; }
  .chip { display: inline-flex; align-items: center; gap: 4px; background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 3px 6px 3px 10px; font-size: .82rem; font-variant-numeric: tabular-nums; }
  .chip .x { border: none; background: transparent; cursor: pointer; font-size: .8rem; line-height: 1; width: 22px; height: 22px; border-radius: 50%; color: var(--muted); }
  .chip .x:hover { background: #f0f0f6; color: var(--ink); }

  .empty { color: var(--muted); text-align: center; padding: 14px; font-size: .92rem; }

  /* Usage list */
  .uitem { display: flex; align-items: center; justify-content: space-between; gap: 8px; border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; margin-top: 8px; font-size: .9rem; }
  .uitem .meta { color: var(--muted); }
  .tag { font-weight: 700; padding: 2px 8px; border-radius: 999px; font-size: .8rem; }
  .tag.mia { background: var(--mia-soft); color: var(--mia); }
  .tag.tia { background: var(--tia-soft); color: var(--tia); }

  details.block { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); margin-top: 16px; padding: 4px 16px; }
  details.block > summary { cursor: pointer; list-style: none; padding: 12px 0; font-weight: 700; font-size: .98rem; display: flex; align-items: center; gap: 7px; }
  details.block > summary::-webkit-details-marker { display: none; }
  details.block > summary::after { content: "＋"; margin-left: auto; color: var(--muted); font-weight: 700; }
  details.block[open] > summary::after { content: "－"; }
  details.block .inner { padding: 4px 0 16px; }

  footer { margin-top: 22px; text-align: center; color: var(--muted); font-size: .8rem; }
  .hint { font-size: .8rem; color: var(--muted); margin-top: 6px; }

  /* ===== Pet playground ===== */
  #view-pet { display: none; }
  .petsw-row { display: flex; gap: 8px; margin-top: 16px; }
  .petsw { flex: 1; padding: 10px; border: 2px solid var(--line); background: #fff; border-radius: 12px; font-weight: 800; cursor: pointer; color: var(--muted); }
  .petsw.on.mia { border-color: var(--mia); color: var(--mia); background: var(--mia-soft); }
  .petsw.on.tia { border-color: var(--tia); color: var(--tia); background: var(--tia-soft); }
  .petbox.mia { border-top: 5px solid var(--mia); }
  .petbox.tia { border-top: 5px solid var(--tia); }
  .petname { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 800; font-size: 1.2rem; }
  .petstage { position: relative; display: flex; justify-content: center; align-items: center; height: 244px; margin: 4px 0; }
  .petstage .petart { animation: bob 3.2s ease-in-out infinite; transform-origin: center bottom; }
  .petstage.act .petart { animation: pop .5s ease; }
  .petart svg { display: block; border-radius: 18px; filter: drop-shadow(0 8px 10px rgba(0,0,0,.10)); }
  .floatfx { position: absolute; top: 28%; font-size: 30px; pointer-events: none; animation: floatup 1.4s ease-out forwards; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes pop { 0% { transform: scale(1); } 30% { transform: scale(1.08); } 60% { transform: scale(.97); } 100% { transform: scale(1); } }
  @keyframes floatup { 0% { transform: translateY(0) scale(.5); opacity: 0; } 25% { opacity: 1; } 100% { transform: translateY(-92px) scale(1.3); opacity: 0; } }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin: 10px 4px 2px; }
  .stat .sl { font-size: .78rem; color: var(--muted); font-weight: 700; }
  .stat .bar { height: 10px; background: #eee; border-radius: 999px; overflow: hidden; }
  .stat .bar i { display: block; height: 100%; background: linear-gradient(90deg,#7c5cff,#ff5fa2); border-radius: 999px; transition: width .45s ease; }
  .carebtns { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 12px; }
  .carebtn { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 4px; border: none; border-radius: 14px; background: #f3f1ff; cursor: pointer; font-size: 1.6rem; }
  .carebtn span { font-size: .72rem; color: var(--muted); font-weight: 700; }
  .carebtn:active { transform: translateY(1px); background: #e9e5ff; }
  .wallet { font-weight: 700; background: #f6f4ff; border-radius: 12px; padding: 10px 12px; }
  .wallet b { color: var(--brand); }
  .wallet.neg b { color: var(--bad); }
  .slottabs { display: flex; flex-wrap: wrap; gap: 6px; margin: 6px 0 12px; }
  .slottab { padding: 7px 12px; border: 1px solid var(--line); background: #fff; border-radius: 999px; font-weight: 700; font-size: .85rem; cursor: pointer; color: var(--muted); }
  .slottab.on { background: var(--brand); color: #fff; border-color: var(--brand); }
  .wardrobe { display: grid; grid-template-columns: repeat(auto-fill,minmax(80px,1fr)); gap: 8px; }
  .witem { position: relative; border: 2px solid var(--line); background: #fff; border-radius: 14px; padding: 10px 4px 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .witem .wemoji { font-size: 1.7rem; line-height: 1; }
  .witem .wname { font-size: .72rem; color: var(--muted); font-weight: 700; }
  .witem .price { font-size: .68rem; font-weight: 800; color: var(--brand); background: #eceaff; border-radius: 999px; padding: 1px 6px; }
  .witem .price.lim { color: #fff; background: var(--warn); }
  .witem.sel { border-color: var(--brand); box-shadow: 0 0 0 3px #eceaff; }
  .witem.locked .wemoji { filter: grayscale(.35); opacity: .85; }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <h1><i class="emo">⭐</i> Mia &amp; Tia 的 3C 時間銀行</h1>
    <div class="rules" id="rulesLine"></div>
  </header>

  <div class="tabbar">
    <button class="tab on" data-tab="sleep">📋 睡眠紀錄</button>
    <button class="tab" data-tab="pet">🎮 寵物樂園</button>
  </div>

  <!-- ========== 睡眠 ========== -->
  <div id="view-sleep">
    <div class="monthbar">
      <button id="prevMonth" title="上個月">‹</button>
      <div class="mlabel" id="monthLabel">—</div>
      <button id="nextMonth" title="下個月">›</button>
      <button class="today" id="thisMonth">本月</button>
    </div>

    <div class="cards" id="cards"></div>

    <section class="block pending" id="pendingBlock" style="display:none">
      <h2>⏰ 進行中（補登起床時間）</h2>
      <div id="pending"></div>
    </section>

    <section class="block">
      <h2>😴 新增睡眠紀錄</h2>
      <form id="recForm" class="grid">
        <div class="grid row2">
          <div class="field">
            <label for="recChild">是誰</label>
            <select id="recChild">
              <option value="mia">🌸 Mia</option>
              <option value="tia">🐬 Tia</option>
              <option value="both">👭 兩人都記</option>
            </select>
          </div>
          <div class="field">
            <label for="recDate">日期（睡的那一晚）</label>
            <input type="date" id="recDate" />
          </div>
        </div>
        <div class="grid row2">
          <div class="field">
            <label>就寢時間（24 小時制）</label>
            <div class="timepick"><select id="recSleepH"></select><span class="sep">:</span><select id="recSleepM"></select></div>
          </div>
          <div class="field">
            <label>起床時間（可之後再補）</label>
            <div class="timepick"><select id="recWakeH"></select><span class="sep">:</span><select id="recWakeM"></select></div>
          </div>
        </div>
        <p class="hint">晚上只想先登記入睡：起床時間維持「--」即可，明天早上再到上方「⏰ 進行中」區補上。</p>
        <div class="preview" id="recPreview"></div>
        <div class="actions">
          <button type="submit" class="btn" id="recSubmit">登記</button>
          <button type="button" class="btn ghost" id="recCancel" hidden>取消修改</button>
        </div>
      </form>
    </section>

    <section class="block">
      <h2>📅 本月睡眠紀錄</h2>
      <div id="records"></div>
    </section>

    <details class="block" id="usageBlock">
      <summary>📺 使用 / 兌換紀錄（扣掉已經看的、買寵物的時間）</summary>
      <div class="inner">
        <form id="useForm" class="grid">
          <div class="grid row3">
            <div class="field">
              <label for="useChild">是誰</label>
              <select id="useChild"><option value="mia">🌸 Mia</option><option value="tia">🐬 Tia</option></select>
            </div>
            <div class="field"><label for="useDate">日期</label><input type="date" id="useDate" /></div>
            <div class="field"><label for="useMin">使用分鐘數</label><input type="number" id="useMin" min="1" step="5" inputmode="numeric" placeholder="例如 30" /></div>
          </div>
          <div class="field"><label for="useNote">備註（可不填）</label><input type="text" id="useNote" placeholder="例如：看卡通、玩平板…" /></div>
          <div class="actions"><button type="submit" class="btn sec">記一筆使用</button></div>
        </form>
        <div id="usages"></div>
      </div>
    </details>

    <details class="block" id="settingsBlock">
      <summary>⚙️ 進階設定（兌換規則）</summary>
      <div class="inner">
        <div class="grid row3">
          <div class="field"><label for="setBaseline">基本睡眠（小時）</label><input type="number" id="setBaseline" min="0" step="0.5" /></div>
          <div class="field"><label for="setStep">每超過（分鐘）</label><input type="number" id="setStep" min="1" step="1" /></div>
          <div class="field"><label for="setReward">可換 3C（分鐘）</label><input type="number" id="setReward" min="1" step="1" /></div>
        </div>
        <div class="actions">
          <button type="button" class="btn sec" id="setSave">儲存設定</button>
          <button type="button" class="btn ghost" id="setReset">恢復預設（8小時 / 30分 / 15分）</button>
        </div>
        <p class="hint">修改規則後，所有月份的計算都會跟著更新。</p>
      </div>
    </details>

    <details class="block" id="dataBlock">
      <summary>💾 資料備份（匯出 / 匯入 / 清除）</summary>
      <div class="inner">
        <p class="hint">資料只存在這台裝置的瀏覽器裡。<b>更新版本、換手機或清快取前，請先「匯出備份」，到新檔案再「匯入」。</b></p>
        <div class="actions">
          <button type="button" class="btn sec" id="exportBtn">匯出備份檔</button>
          <button type="button" class="btn ghost" id="importBtn">匯入備份檔</button>
          <input type="file" id="importFile" accept="application/json,.json" hidden />
          <button type="button" class="btn danger" id="clearBtn">清除所有資料</button>
        </div>
      </div>
    </details>
  </div>

  <!-- ========== 寵物樂園 ========== -->
  <div id="view-pet"></div>

  <footer>
    睡飽飽，換 3C ⭐ · 24 小時制 · 睡好賺 3C，3C 可看螢幕、也能幫小怪獸買裝扮 🐾
  </footer>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "mt-3c-panel-v1";
  var DEFAULTS = { baseline: 480, step: 30, reward: 15 };
  var CHILDREN = [
    { key: "mia", name: "Mia", emoji: "🌸", cls: "mia" },
    { key: "tia", name: "Tia", emoji: "🐬", cls: "tia" }
  ];
  var PALETTE = {
    mia: { fur: "#c98bff", dark: "#9a5fd0", inner: "#ecd8ff", belly: "#faf3ff", cheek: "#ff6fbe" },
    tia: { fur: "#5fb0ff", dark: "#2f86d8", inner: "#d6eaff", belly: "#f2f8ff", cheek: "#3a93ec" }
  };

  // ---------- helpers ----------
  function $(id) { return document.getElementById(id); }
  function pad2(n) { return (n < 10 ? "0" : "") + n; }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function clamp(v) { return Math.max(0, Math.min(100, v)); }
  function todayStr() { var d = new Date(); return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate()); }
  function currentMonthKey() { return todayStr().slice(0, 7); }
  function monthKey(s) { return (s || "").slice(0, 7); }
  function childOf(key) { for (var i = 0; i < CHILDREN.length; i++) if (CHILDREN[i].key === key) return CHILDREN[i]; return CHILDREN[0]; }
  function shiftMonth(mk, delta) { var p = mk.split("-"), y = +p[0], m = +p[1] + delta; while (m < 1) { m += 12; y--; } while (m > 12) { m -= 12; y++; } return y + "-" + pad2(m); }
  function monthLabel(mk) { var p = mk.split("-"); return p[0] + " 年 " + (+p[1]) + " 月"; }
  function timeToMin(t) { var p = (t || "").split(":"); return (+p[0]) * 60 + (+p[1]); }
  function sessionDuration(rec) { if (!rec.wake || !rec.sleep) return 0; var d = timeToMin(rec.wake) - timeToMin(rec.sleep); if (d <= 0) d += 1440; return d; }
  function fmtMin(min) {
    min = Math.round(min); var sign = min < 0 ? "-" : ""; min = Math.abs(min);
    var h = Math.floor(min / 60), m = min % 60;
    if (h && m) return sign + h + " 小時 " + m + " 分";
    if (h) return sign + h + " 小時";
    return sign + m + " 分";
  }
  var WD = ["日", "一", "二", "三", "四", "五", "六"];
  function fmtDate(d) { var p = d.split("-").map(Number); var wd = WD[new Date(p[0], p[1] - 1, p[2]).getDay()]; return p[1] + "/" + p[2] + "（" + wd + "）"; }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; }); }

  // ---------- state / persistence ----------
  function defaultPet() {
    return { name: "", base: "classic",
      wear: { hat: null, eyes: null, outfit: null, back: null, hand: null, bg: null },
      stats: { happy: 70, full: 70, clean: 70, energy: 70 }, lastTick: Date.now() };
  }

    setTimeout(function () { if (sp.parentNode) sp.parentNode.removeChild(sp); }, 1450);
  }

  // ================= render: 睡眠 =================
  var monthLabelEl = $("monthLabel"), cardsEl = $("cards"), pendingBlock = $("pendingBlock"),
    pendingEl = $("pending"), recordsEl = $("records"), usagesEl = $("usages"), rulesLineEl = $("rulesLine");
  var recForm = $("recForm"), recChild = $("recChild"), recDate = $("recDate"),
    recSleepH = $("recSleepH"), recSleepM = $("recSleepM"), recWakeH = $("recWakeH"), recWakeM = $("recWakeM"),
    recPreview = $("recPreview"), recSubmit = $("recSubmit"), recCancel = $("recCancel");
  recSleepH.innerHTML = HOUR_OPTS; recSleepM.innerHTML = MIN_OPTS; recWakeH.innerHTML = HOUR_OPTS; recWakeM.innerHTML = MIN_OPTS;

  function renderRules() {
    var s = state.settings;
    rulesLineEl.innerHTML = "睡滿 <b>" + fmtMin(s.baseline) + "</b> 後，每多睡 <b>" + s.step + " 分鐘</b> → 兌換 <b>" + s.reward + " 分鐘</b> 3C 時間。";
  }
  function renderMonth() { monthLabelEl.textContent = monthLabel(viewMonth); }
  function renderCards() {
    cardsEl.innerHTML = CHILDREN.map(function (ch) {
      var earned = monthlyEarned(ch.key, viewMonth), used = monthlyUsed(ch.key, viewMonth), bal = earned - used;
      return '<div class="card ' + ch.cls + '"><div class="card-top">' +
        '<div class="mascot">' + petSVG(ch.key, { size: 78, showBg: false }) + "</div>" +
        '<div class="card-info"><div class="who">' + ch.emoji + " " + ch.name + "</div>" +
        '<div class="bignum ' + (bal < 0 ? "neg" : "") + '">' + fmtMin(bal) + ' <span class="unit">可用</span></div></div></div>' +
        '<div class="sub"><span>本月賺到 <b>' + fmtMin(earned) + "</b></span><span>已使用 <b>" + fmtMin(used) + "</b></span></div></div>";
    }).join("");
  }
  function renderPending() {
    var pend = state.records.filter(function (r) { return !r.wake; });
    pend.sort(function (a, b) { return (a.date + a.sleep) < (b.date + b.sleep) ? 1 : -1; });
    if (!pend.length) { pendingBlock.style.display = "none"; pendingEl.innerHTML = ""; return; }
    pendingBlock.style.display = "";
    pendingEl.innerHTML = pend.map(function (r) {
      var ch = childOf(r.child);
      return '<div class="prow" data-id="' + r.id + '"><div class="pinfo"><span class="tag ' + ch.cls + '">' + ch.emoji + " " + ch.name + '</span> <b>入睡 ' + r.sleep + '</b> <span class="meta">' + fmtDate(r.date) + '</span></div>' +
        '<div class="pcomplete"><span class="lbl">起床時間</span><select class="ph">' + HOUR_OPTS + '</select><span class="sep">:</span><select class="pm">' + MIN_OPTS + '</select>' +
        '<button class="btn warn sm" data-complete="' + r.id + '">✓ 完成</button><button class="btn ghost sm" data-cancel="' + r.id + '">刪除</button></div></div>';
    }).join("");
  }
  function renderRecords() {
    var recs = state.records.filter(function (r) { return r.wake && monthKey(r.date) === viewMonth; });
    if (!recs.length) { recordsEl.innerHTML = '<p class="empty">本月還沒有完成的睡眠紀錄 😴</p>'; return; }
    var byDate = {};
    recs.forEach(function (r) { if (!byDate[r.date]) byDate[r.date] = {}; if (!byDate[r.date][r.child]) byDate[r.date][r.child] = []; byDate[r.date][r.child].push(r); });
    var dates = Object.keys(byDate).sort().reverse(), html = "";
    dates.forEach(function (date) {
      html += '<div class="day"><div class="day-date">' + fmtDate(date) + "</div>";
      CHILDREN.forEach(function (ch) {
        var sessions = byDate[date][ch.key]; if (!sessions) return;
        var total = sessions.reduce(function (a, r) { return a + sessionDuration(r); }, 0), earned = earnedForDuration(total);
        var chips = sessions.map(function (r) { return '<span class="chip">' + r.sleep + " → " + r.wake + '<button class="x" data-edit="' + r.id + '" title="修改">✎</button><button class="x" data-del="' + r.id + '" title="刪除">✕</button></span>'; }).join("");
        html += '<div class="rec ' + ch.cls + '"><div class="rec-head"><span class="who">' + ch.emoji + " " + ch.name + '</span><span class="earn">+' + earned + ' 分 3C</span></div><div class="rec-body"><span class="dur">睡 ' + fmtMin(total) + "</span>" + chips + "</div></div>";
      });
      html += "</div>";
    });
    recordsEl.innerHTML = html;
  }
  function renderUsages() {
    var us = state.usages.filter(function (u) { return monthKey(u.date) === viewMonth; });
    us.sort(function (a, b) { return a.date < b.date ? 1 : -1; });
    if (!us.length) { usagesEl.innerHTML = '<p class="empty">本月還沒有使用紀錄。</p>'; return; }
    usagesEl.innerHTML = us.map(function (u) {
      var ch = childOf(u.child);
      return '<div class="uitem"><div><span class="tag ' + ch.cls + '">' + ch.emoji + " " + ch.name + '</span> <b>−' + u.minutes + ' 分</b>' + (u.note ? ' <span class="meta">· ' + escapeHtml(u.note) + "</span>" : "") + '<div class="meta">' + fmtDate(u.date) + '</div></div><button class="btn ghost" data-uden="' + u.id + '">刪除</button></div>';
    }).join("");
  }
  function render() { renderRules(); renderMonth(); renderCards(); renderPending(); renderRecords(); renderUsages(); }

  // ================= render: 寵物 =================
  var petWho = "mia", petSlot = "hat";
  function statsHTML(p) {
    var defs = [["happy", "開心", "💛"], ["full", "飽足", "🍙"], ["clean", "清潔", "🫧"], ["energy", "精神", "⚡"]];
    return '<div class="stats">' + defs.map(function (d) {
      return '<div class="stat"><span class="sl">' + d[2] + " " + d[1] + '</span><div class="bar"><i style="width:' + Math.round(p.stats[d[0]]) + '%"></i></div></div>';
    }).join("") + "</div>";
  }
  function itemBtn(childKey, slotKey, it, sel) {
    var none = it.id === null, owned = none ? true : isOwned(childKey, it), tag = "";
    if (!none && !owned) tag = '<span class="price">' + (it.limited ? "🔒 " : "") + fmtMin(it.price) + "</span>";
    else if (!none && it.limited) tag = '<span class="price lim">限定</span>';
    return '<button class="witem' + (sel ? " sel" : "") + (owned ? "" : " locked") + '" data-wslot="' + slotKey + '" data-witem="' + (none ? "" : it.id) + '">' +
      '<span class="wemoji">' + (it.emoji || "⭐") + '</span><span class="wname">' + it.name + "</span>" + tag + "</button>";
  }
  function wardrobeHTML(childKey, slotKey) {
    var p = state.pets[childKey], worn = (slotKey === "base") ? p.base : p.wear[slotKey], out = "";
    if (slotKey !== "base") out += itemBtn(childKey, slotKey, { id: null, name: "不戴", emoji: "🚫", price: 0 }, worn == null);
    (ITEMS[slotKey] || []).forEach(function (it) { out += itemBtn(childKey, slotKey, it, worn === it.id); });
    return '<div class="wardrobe">' + out + "</div>";
  }
  function renderPet() {
    var ch = childOf(petWho), p = state.pets[petWho], bal = balanceOf(petWho), nm = p.name || ch.name;
    var sw = CHILDREN.map(function (c) { return '<button class="petsw ' + c.cls + (c.key === petWho ? " on" : "") + '" data-petwho="' + c.key + '">' + c.emoji + " " + (state.pets[c.key].name || c.name) + "</button>"; }).join("");
    var care = '<div class="carebtns">' + Object.keys(ACTIONS).map(function (k) { return '<button class="carebtn" data-act="' + k + '">' + ACTIONS[k].emoji + "<span>" + ACTIONS[k].label + "</span></button>"; }).join("") + "</div>";
    var slotTabs = '<div class="slottabs">' + SLOTS.map(function (sl) { return '<button class="slottab' + (sl.key === petSlot ? " on" : "") + '" data-slottab="' + sl.key + '">' + sl.name + "</button>"; }).join("") + "</div>";
    $("view-pet").innerHTML =
      '<div class="petsw-row">' + sw + "</div>" +
      '<section class="block petbox ' + ch.cls + '">' +
        '<div class="petname"><span>' + escapeHtml(nm) + '</span><button class="btn ghost sm" data-rename="1">✏️ 改名</button></div>' +
        '<div class="petstage"><div class="petart">' + petSVG(petWho, { size: 220, expr: petExpr }) + "</div></div>" +
        statsHTML(p) + care +
      "</section>" +
      '<section class="block"><div class="wallet ' + (bal < 0 ? "neg" : "") + '">👛 ' + ch.name + " 的 3C 錢包：<b>" + fmtMin(bal) + "</b></div>" +
        '<h2 style="margin-top:12px">🛍️ 衣櫥 / 商店</h2>' + slotTabs + wardrobeHTML(petWho, petSlot) +
        '<p class="hint">基本款免費換；標價的用 3C 兌換（會記一筆扣款）；🔒 限定款連續睡飽解鎖、或用 3C 兌換。</p></section>';
  }
  function renamePet() {
    var n = prompt("幫 " + childOf(petWho).name + " 的小怪獸取名字：", state.pets[petWho].name || "");
    if (n === null) return;
    state.pets[petWho].name = n.trim().slice(0, 12); save(); renderPet();
  }
  function tryBuy(childKey, it) {
    if (it.unlockStreak && sleepStreak(childKey) >= it.unlockStreak) { state.inventory[childKey][it.id] = true; return true; }
    var bal = balanceOf(childKey);
    if (bal < it.price) { alert("3C 不夠喔！還差 " + fmtMin(it.price - bal) + "。" + (it.unlockStreak ? "（或連續睡飽 " + it.unlockStreak + " 晚免費解鎖）" : "")); return false; }
    if (!confirm("用 " + fmtMin(it.price) + " 3C 兌換「" + it.name + "」嗎？")) return false;
    state.usages.push({ id: uid(), child: childKey, date: todayStr(), minutes: it.price, note: "🛍️ 換購 " + it.name });
    if (!state.inventory[childKey]) state.inventory[childKey] = {};
    state.inventory[childKey][it.id] = true;
    return true;
  }
  function chooseItem(childKey, slotKey, itemId) {
    var p = state.pets[childKey];
    if (slotKey === "base") {
      var b = findItem("base", itemId); if (!b) return;
      if (!isOwned(childKey, b) && !tryBuy(childKey, b)) return;
      p.base = itemId;
    } else if (itemId === "") {
      p.wear[slotKey] = null;
    } else {
      var it = findItem(slotKey, itemId); if (!it) return;
      if (!isOwned(childKey, it) && !tryBuy(childKey, it)) return;
      p.wear[slotKey] = (p.wear[slotKey] === itemId) ? null : itemId;
    }
    save(); renderPet(); renderCards();
  }
  $("view-pet").addEventListener("click", function (e) {
    var t;
    if ((t = e.target.closest("[data-petwho]"))) { petWho = t.getAttribute("data-petwho"); petExpr = "auto"; clearTimeout(exprTimer); renderPet(); return; }
    if ((t = e.target.closest("[data-rename]"))) { renamePet(); return; }
    if ((t = e.target.closest("[data-act]"))) { doAction(petWho, t.getAttribute("data-act")); return; }
    if ((t = e.target.closest("[data-slottab]"))) { petSlot = t.getAttribute("data-slottab"); renderPet(); return; }
    if ((t = e.target.closest("[data-witem]"))) { chooseItem(petWho, t.getAttribute("data-wslot"), t.getAttribute("data-witem")); return; }
  });

  // ---------- tabs ----------
  function showTab(t) {
    $("view-sleep").style.display = t === "sleep" ? "block" : "none";
    $("view-pet").style.display = t === "pet" ? "block" : "none";
    var tabs = document.querySelectorAll(".tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.toggle("on", tabs[i].getAttribute("data-tab") === t);
    if (t === "pet") renderPet();
  }
  (function () {
    var tabs = document.querySelectorAll(".tab");
    for (var i = 0; i < tabs.length; i++) tabs[i].addEventListener("click", function () { showTab(this.getAttribute("data-tab")); });
  })();

  // ---------- record form ----------
  function updateForm() {
    var sleep = readTime(recSleepH, recSleepM), wake = readTime(recWakeH, recWakeM);
    if (!sleep) recPreview.textContent = "";
    else if (!wake) recPreview.innerHTML = "先登記入睡 <b>" + sleep + "</b>，起床後再補、屆時計算 3C。";
    else { var dur = sessionDuration({ sleep: sleep, wake: wake }); recPreview.innerHTML = "這段睡眠 <b>" + fmtMin(dur) + "</b> → 約可兌換 <b>" + earnedForDuration(dur) + " 分鐘</b> 3C"; }
    if (!editingId) recSubmit.textContent = sleep && !wake ? "登記入睡（起床再補）" : "登記";
  }
  [recSleepH, recSleepM, recWakeH, recWakeM].forEach(function (el) { el.addEventListener("change", updateForm); });
  function findRec(id) { for (var i = 0; i < state.records.length; i++) if (state.records[i].id === id) return state.records[i]; return null; }
  recForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var date = recDate.value || todayStr(), sleep = readTime(recSleepH, recSleepM), wake = readTime(recWakeH, recWakeM);
    if (!sleep) { alert("請選擇就寢時間"); return; }
    if (editingId) {
      var r = findRec(editingId);
      if (r) { r.child = recChild.value === "both" ? r.child : recChild.value; r.date = date; r.sleep = sleep; r.wake = wake; }
      exitEdit();
    } else {
      var targets = recChild.value === "both" ? ["mia", "tia"] : [recChild.value];
      targets.forEach(function (c) { state.records.push({ id: uid(), child: c, date: date, sleep: sleep, wake: wake }); });
    }
    save(); setTime(recSleepH, recSleepM, ""); setTime(recWakeH, recWakeM, ""); updateForm(); render();
  });
  function startEdit(id) {
    var r = findRec(id); if (!r) return;
    editingId = id; recChild.value = r.child; recDate.value = r.date;
    setTime(recSleepH, recSleepM, r.sleep); setTime(recWakeH, recWakeM, r.wake);
    recChild.querySelector('option[value="both"]').disabled = true;
    recSubmit.textContent = "儲存修改"; recCancel.hidden = false; updateForm();
    recForm.scrollIntoView({ behavior: "smooth", block: "center" });
  }
  function exitEdit() {
    editingId = null; recChild.querySelector('option[value="both"]').disabled = false; recCancel.hidden = true;
    setTime(recSleepH, recSleepM, ""); setTime(recWakeH, recWakeM, ""); updateForm();
  }
  recCancel.addEventListener("click", exitEdit);
  function delRecord(id) {
    if (!confirm("確定要刪除這筆睡眠紀錄嗎？")) return;
    state.records = state.records.filter(function (x) { return x.id !== id; });
    if (editingId === id) exitEdit();
    save(); render();
  }
  recordsEl.addEventListener("click", function (e) {
    var ed = e.target.closest("[data-edit]"), de = e.target.closest("[data-del]");
    if (ed) startEdit(ed.getAttribute("data-edit")); else if (de) delRecord(de.getAttribute("data-del"));
  });
  pendingEl.addEventListener("click", function (e) {
    var done = e.target.closest("[data-complete]"), cancel = e.target.closest("[data-cancel]");
    if (done) {
      var row = done.closest(".prow"), h = row.querySelector(".ph").value, m = row.querySelector(".pm").value || "00";
      if (!h) { alert("請選擇起床時間"); return; }
      var r = findRec(done.getAttribute("data-complete"));
      if (r) { r.wake = h + ":" + m; var pet = state.pets[r.child]; if (pet) pet.stats.energy = clamp(pet.stats.energy + 30); save(); render(); }
    } else if (cancel) {
      if (!confirm("刪除這筆入睡登記？")) return;
      var id = cancel.getAttribute("data-cancel");
      state.records = state.records.filter(function (x) { return x.id !== id; });
      save(); render();
    }
  });

  // ---------- usage form ----------
  var useForm = $("useForm");
  useForm.addEventListener("submit", function (e) {
    e.preventDefault();
    var mins = parseInt($("useMin").value, 10);
    if (!mins || mins <= 0) { alert("請輸入使用分鐘數"); return; }
    state.usages.push({ id: uid(), child: $("useChild").value, date: $("useDate").value || todayStr(), minutes: mins, note: $("useNote").value.trim() });
    save(); $("useMin").value = ""; $("useNote").value = ""; render();
  });
  usagesEl.addEventListener("click", function (e) {
    var d = e.target.closest("[data-uden]"); if (!d) return;
    if (!confirm("確定要刪除這筆使用紀錄嗎？")) return;
    var id = d.getAttribute("data-uden");
    state.usages = state.usages.filter(function (x) { return x.id !== id; });
    save(); render();
  });

  // ---------- month nav ----------
  $("prevMonth").addEventListener("click", function () { viewMonth = shiftMonth(viewMonth, -1); render(); });
  $("nextMonth").addEventListener("click", function () { viewMonth = shiftMonth(viewMonth, 1); render(); });
  $("thisMonth").addEventListener("click", function () { viewMonth = currentMonthKey(); render(); });

  // ---------- settings ----------
  function fillSettings() { $("setBaseline").value = state.settings.baseline / 60; $("setStep").value = state.settings.step; $("setReward").value = state.settings.reward; }
  $("setSave").addEventListener("click", function () {
    var b = parseFloat($("setBaseline").value), st = parseInt($("setStep").value, 10), rw = parseInt($("setReward").value, 10);
    if (!(b >= 0) || !(st > 0) || !(rw > 0)) { alert("請輸入正確的數字（每超過、可換分鐘需大於 0）"); return; }
    state.settings = { baseline: Math.round(b * 60), step: st, reward: rw };
    save(); fillSettings(); render(); updateForm(); alert("設定已儲存");
  });
  $("setReset").addEventListener("click", function () { state.settings = Object.assign({}, DEFAULTS); save(); fillSettings(); render(); updateForm(); });

  // ---------- backup ----------
  $("exportBtn").addEventListener("click", function () {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    var a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "mia-tia-3c-" + todayStr() + ".json";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
  });
  $("importBtn").addEventListener("click", function () { $("importFile").click(); });
  $("importFile").addEventListener("change", function (e) {
    var f = e.target.files && e.target.files[0]; if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      try {
        var d = JSON.parse(reader.result);
        if (!d || typeof d !== "object") throw new Error("bad");
        if (!confirm("匯入會覆蓋目前的資料，確定嗎？")) { e.target.value = ""; return; }
        state = fromData(d); save(); fillSettings(); render(); updateForm();
        if ($("view-pet").style.display !== "none") renderPet();
        alert("匯入完成 ✓");
      } catch (err) { alert("檔案格式不正確，無法匯入。"); }
      e.target.value = "";
    };
    reader.readAsText(f);
  });
  $("clearBtn").addEventListener("click", function () {
    if (!confirm("確定要清除「所有」資料嗎？此動作無法復原（建議先匯出備份）。")) return;
    state = blank(); localStorage.removeItem(STORAGE_KEY); exitEdit(); fillSettings(); render();
  });

  // ---------- init ----------
  tickPet(state.pets.mia); tickPet(state.pets.tia); save();
  recDate.value = todayStr(); $("useDate").value = todayStr();
  setTime(recSleepH, recSleepM, ""); setTime(recWakeH, recWakeM, "");
  fillSettings(); updateForm(); render(); showTab("sleep");
})();
</script>
</body>
</html>
